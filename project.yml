name: xFractal
options:
  bundleIdPrefix: com.arizonasoftware
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "26.4"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES

targets:
  xFractal:
    type: application
    platform: macOS
    sources:
      - path: xFractal
        excludes:
          - "Info-iOS.plist"
    settings:
      base:
        PRODUCT_NAME: xFractal
        PRODUCT_BUNDLE_IDENTIFIER: com.arizonasoftware.xFractal
        INFOPLIST_FILE: xFractal/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_ENTITLEMENTS: xFractal.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Frameworks
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    dependencies:
      - framework: Frameworks/Sparkle.framework
        embed: true
        codeSign: true
    scheme:
      testTargets:
        - xFractalTests

  xFractalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: xFractal
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.arizonasoftware.xFractalTests
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Frameworks

  xFractal-iOS:
    type: application
    platform: iOS
    sources:
      - path: xFractal
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: xFractal
        PRODUCT_BUNDLE_IDENTIFIER: com.arizonasoftware.xFractal
        INFOPLIST_FILE: xFractal/Info-iOS.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "iPhone Developer"
        DEVELOPMENT_TEAM: 28XRU7S6GA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
